<!DOCTYPE html>
<html>
<head>

<title>AI Health Symptom Checker</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">


</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center text-primary">
🩺 AI Health Symptom Checker
</h2>

<form action="/predict" method="post">

<label class="mt-4">Select Symptoms</label>

<label class="mt-4">Select Symptoms</label>

<select name="symptoms" multiple size="5" class="form-control">

{% for symptom in symptoms %}

<option value="{{symptom}}">
{{ symptom.replace("_"," ").title() }}
</option>

{% endfor %}

</select>
<br>

<button class="btn btn-primary w-100">
Predict Disease
</button>

</form>

</div>
</div>

<footer class="text-center mt-5 text-muted">
<p>Created by <a href="https://www.linkedin.com/in/tarannum-khan-6b2234242/" target="_blank">Tarannum</a> • AI Health Symptom Checker</p>
</footer>

</body>
</html>
</body>

</html>
