<!DOCTYPE html>
<html>
<head>

<title>AI Health Checker</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container">

<h1 class="text-center mt-5">AI Health Symptom Checker</h1>

<form action="/predict" method="post">

<label>Select Symptoms</label>

<select name="symptoms" multiple class="form-control">

{% for s in symptoms %}
<option value="{{s}}">{{s.replace("_"," ")}}</option>
{% endfor %}

</select>

<button class="btn btn-primary mt-3">Predict Disease</button>

</form>

{% if prediction %}

<div class="alert alert-success mt-4">

<h4>Predicted Disease: {{prediction}}</h4>

</div>

{% endif %}

</div>

</body>
</html>
